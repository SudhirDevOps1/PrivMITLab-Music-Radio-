<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">PrivMITLab</title>
  <desc id="icon-desc">Music and radio hub — vinyl disc with play button</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="round"><rect width="64" height="64" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="64" height="64" fill="url(#bg)"/>
    <rect width="64" height="64" fill="url(#shine)"/>

    <!-- Vinyl disc -->
    <circle cx="32" cy="32" r="20" fill="#0f0a2e" opacity="0.88"/>

    <!-- Grooves -->
    <circle cx="32" cy="32" r="17.5" fill="none" stroke="#fff" stroke-opacity="0.07" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="15"   fill="none" stroke="#fff" stroke-opacity="0.05" stroke-width="0.6"/>
    <circle cx="32" cy="32" r="12.5" fill="none" stroke="#fff" stroke-opacity="0.07" stroke-width="0.6"/>

    <!-- Label area -->
    <circle cx="32" cy="32" r="8" fill="url(#bg)" opacity="0.75"/>

    <!-- Center hole -->
    <circle cx="32" cy="32" r="2" fill="#0f0a2e" opacity="0.5"/>

    <!-- Play triangle -->
    <path d="M29 26v12l10-6z" fill="#fff" opacity="0.95"/>

    <!-- Sound waves — right -->
    <path d="M49 28q3 4 0 8"   fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M53 24q5 8 0 16"  fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Sound waves — left -->
    <path d="M15 28q-3 4 0 8"  fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M11 24q-5 8 0 16" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
