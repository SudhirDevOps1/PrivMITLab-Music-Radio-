<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="icon-title icon-desc">
  <title id="icon-title">PrivMITLab</title>
  <desc id="icon-desc">Music and radio hub — 3D vinyl disc with play button and sound waves</desc>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- 3D Vinyl disc gradient (light hits top-left) -->
    <radialGradient id="disc" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1e1545"/>
      <stop offset="60%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#080518"/>
    </radialGradient>

    <!-- Label gradient (raised center) -->
    <radialGradient id="label" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>

    <!-- Play button shadow -->
    <filter id="playShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0.5" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>

    <!-- Clip to rounded square -->
    <clipPath id="round"><rect width="64" height="64" rx="16"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <!-- Background -->
    <rect width="64" height="64" fill="url(#bg)"/>

    <!-- Curved glass shine (top-left light reflection) -->
    <path d="M0 0 Q32 28 64 0 L64 0 L0 0 Z" fill="#fff" opacity="0.14"/>

    <!-- Outer rim highlight (3D edge) -->
    <circle cx="32" cy="32" r="21" fill="none" stroke="#fff" stroke-opacity="0.12" stroke-width="0.7"/>

    <!-- Vinyl disc body -->
    <circle cx="32" cy="32" r="20" fill="url(#disc)"/>

    <!-- Grooves (4 rings for realism) -->
    <circle cx="32" cy="32" r="18"   fill="none" stroke="#fff" stroke-opacity="0.06" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="15.5" fill="none" stroke="#fff" stroke-opacity="0.04" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="13"   fill="none" stroke="#fff" stroke-opacity="0.06" stroke-width="0.5"/>
    <circle cx="32" cy="32" r="10.5" fill="none" stroke="#fff" stroke-opacity="0.04" stroke-width="0.5"/>

    <!-- Label area (raised look) -->
    <circle cx="32" cy="32" r="8" fill="url(#label)"/>
    <!-- Label highlight ring -->
    <circle cx="32" cy="32" r="8" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="0.4"/>

    <!-- Center hole -->
    <circle cx="32" cy="32" r="2" fill="#0f0a2e" opacity="0.6"/>

    <!-- Play triangle (with shadow for pop) -->
    <path d="M29 26v12l10-6z" fill="#fff" filter="url(#playShadow)"/>

    <!-- Sound waves — right (3 layers, fading out) -->
    <path d="M49 28q3 4 0 8"   fill="none" stroke="#fff" stroke-opacity="0.6"  stroke-width="1.8" stroke-linecap="round"/>
    <path d="M53 24q5 8 0 16"  fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M56.5 20q7 12 0 24" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Sound waves — left (3 layers, fading out) -->
    <path d="M15 28q-3 4 0 8"  fill="none" stroke="#fff" stroke-opacity="0.6"  stroke-width="1.8" stroke-linecap="round"/>
    <path d="M11 24q-5 8 0 16" fill="none" stroke="#fff" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M7.5 20q-7 12 0 24" fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
