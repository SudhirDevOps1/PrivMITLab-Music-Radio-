    <!-- ─── Critical Loading CSS ──────────────────────────── -->
    <style>
      :root {
        --splash-bg: #0f0a2e;
        --splash-primary: #7c3aed;
        --splash-pink: #ec4899;
      }

      html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

      #root {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        background: linear-gradient(135deg, #0f0a2e 0%, #1a0e3e 50%, #0f0a2e 100%);
      }

      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        animation: splash-fade 0.4s ease-out;
      }

      .splash-icon {
        width: 72px;
        height: 72px;
        border-radius: 20px;
        background: linear-gradient(135deg, var(--splash-primary), var(--splash-pink));
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
      }

      .splash-icon svg {
        width: 40px;
        height: 40px;
      }

      .splash-bar {
        width: 120px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }

      .splash-bar-inner {
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--splash-primary), var(--splash-pink));
        animation: splash-slide 1.2s ease-in-out infinite;
      }

      @keyframes splash-fade {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
      }

      @keyframes splash-slide {
        0%   { transform: translateX(-100%); }
        50%  { transform: translateX(200%); }
        100% { transform: translateX(-100%); }
      }

      @media (prefers-reduced-motion: reduce) {
        .splash-bar-inner { animation: none; transform: translateX(0); }
        .splash { animation: none; }
      }
    </style>

    <!-- ─── Structured Data ───────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "PrivMITLab",

      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "browserRequirements": "Requires JavaScript. Requires HTML5 audio."
    }
    </script>
  </head>

            <path d="M11 8.5v7l5.5-3.5z" fill="white"/>

        </div>
        <div class="splash-bar">

        </div>
      </div>
    </div>

    <noscript>
